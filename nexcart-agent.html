<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexcart 业务智能体</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #252525;
    --border2: #333;
    --text: #ede9e0;
    --muted: #5a5a5a;
    --muted2: #3a3a3a;
    --accent: #e8f542;
    --accent2: #c8d435;
    --green: #4dffaa;
    --red: #ff5555;
    --blue: #5599ff;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Lock */
  .lock {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; padding: 24px;
  }
  .lock-box { width: 100%; max-width: 320px; text-align: center; }
  .lock-logo { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 28px; }
  .lock-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .lock-sub { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 24px; }
  .lock-input {
    width: 100%; background: var(--surface); border: 1.5px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 15px;
    padding: 13px 16px; border-radius: 8px; outline: none; text-align: center;
    letter-spacing: 0.12em; margin-bottom: 10px; transition: border-color 0.15s;
  }
  .lock-input:focus { border-color: var(--accent); }
  .lock-input.shake { animation: shake 0.3s ease; border-color: var(--red); }
  .lock-btn {
    width: 100%; padding: 13px; background: var(--accent); color: #0a0a0a;
    border: none; border-radius: 8px; font-family: var(--sans); font-size: 14px;
    font-weight: 800; cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .lock-err { font-family: var(--mono); font-size: 12px; color: var(--red); margin-top: 10px; min-height: 16px; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* Header */
  .header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; }
  .agent-name { font-size: 15px; font-weight: 700; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .header-right { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  /* Main layout */
  .main {
    display: flex; flex: 1; overflow: hidden;
    max-height: calc(100vh - 57px);
  }

  /* Sidebar */
  .sidebar {
    width: 240px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; }
  .quick-btn {
    display: block; width: 100%;
    padding: 9px 12px; margin-bottom: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--sans);
    font-size: 12px; text-align: left; cursor: pointer;
    transition: all 0.15s; line-height: 1.4;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,245,66,0.04); }
  .quick-btn:last-child { margin-bottom: 0; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px;
  }
  .stat-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--accent); }

  /* Chat area */
  .chat-area {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Message bubbles */
  .msg { display: flex; gap: 12px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 6px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .msg.agent .msg-avatar { background: var(--accent); color: #0a0a0a; }
  .msg.user .msg-avatar { background: var(--surface2); color: var(--muted); font-family: var(--mono); font-size: 11px; }
  .msg-content {
    max-width: calc(100% - 80px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    font-size: 14px; line-height: 1.7;
  }
  .msg.user .msg-content {
    background: var(--surface2); border-color: var(--border2);
  }
  .msg-content p { margin-bottom: 8px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content strong { color: var(--accent); font-weight: 600; }
  .msg-content table {
    width: 100%; border-collapse: collapse; margin: 10px 0;
    font-family: var(--mono); font-size: 12px;
  }
  .msg-content th {
    background: var(--surface2); color: var(--muted);
    padding: 6px 10px; text-align: left; font-weight: 500;
    border-bottom: 1px solid var(--border2);
    letter-spacing: 0.05em;
  }
  .msg-content td {
    padding: 6px 10px; border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .msg-content tr:last-child td { border-bottom: none; }
  .msg-content .highlight { color: var(--green); font-weight: 500; }
  .msg-content .warn { color: var(--red); }
  .msg-content ul, .msg-content ol { padding-left: 20px; margin: 8px 0; }
  .msg-content li { margin-bottom: 4px; }
  .msg-content code {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 1px 6px; border-radius: 3px;
    font-family: var(--mono); font-size: 12px; color: var(--accent);
  }
  .msg-time { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 5px; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    animation: bounce 1.2s ease infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  /* Input */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-wrap { flex: 1; position: relative; }
  #chat-input {
    width: 100%; background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text); font-family: var(--sans); font-size: 14px;
    padding: 12px 16px; border-radius: 8px; outline: none;
    resize: none; min-height: 46px; max-height: 120px;
    line-height: 1.5; transition: border-color 0.15s;
  }
  #chat-input:focus { border-color: var(--accent); }
  #chat-input::placeholder { color: var(--muted2); }
  .send-btn {
    width: 46px; height: 46px; flex-shrink: 0;
    background: var(--accent); border: none; border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:disabled { background: var(--border2); cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: #0a0a0a; }

  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 600px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- Lock -->
<div class="lock" id="lock">
  <div class="lock-box">
    <div class="lock-logo">Nexcart-ops</div>
    <div class="lock-title">业务智能体</div>
    <div class="lock-sub">请输入访问密码</div>
    <input class="lock-input" type="password" id="lock-input" placeholder="••••••••••••"
      onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">进入</button>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden" style="display:flex;flex-direction:column;height:100vh">

  <div class="header">
    <div class="header-left">
      <div class="status-dot"></div>
      <div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-section">

        <button class="quick-btn" onclick="ask('哪个尺码段成交最频繁？')">📏 热销尺码分析</button>
        <button class="quick-btn" onclick="ask('Whatnot 和 TikTok Live 哪个平台表现更好？')">⚖️ 平台对比分析</button>
        <button class="quick-btn" onclick="ask('最近30场中，毛利最高的5场有什么共同点？')">🏆 最佳场次分析</button>
        <button class="quick-btn" onclick="ask('Cape Robin 品牌和无品牌相比，成交价差多少？')">🏷️ 品牌溢价分析</button>
        <button class="quick-btn" onclick="ask('给我今晚直播的排品建议')">🎯 今晚排品建议</button>

      <div class="sidebar-section">
        <div class="sidebar-label">数据概览</div>
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card"><div class="stat-label">总场次</div><div class="stat-value" id="s-shows">—</div></div>
          <div class="stat-card"><div class="stat-label">总成交</div><div class="stat-value" id="s-sales">—</div></div>
          <div class="stat-card"><div class="stat-label">平均毛利率</div><div class="stat-value" id="s-margin">—</div></div>
          <div class="stat-card"><div class="stat-label">最近场次</div><div class="stat-value" id="s-last">—</div></div>
        </div>
      </div>
    </div>

    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="msg agent">
          <div class="msg-avatar">N</div>
          <div>
            <div class="msg-content">
              <p>你好！我是你的 <strong>Nexcart 业务智能体</strong>，我已连接到你的实时数据库。</p>
              <p>你可以直接问我任何关于你生意的问题，比如：</p>
              <ul>
                <li>哪种鞋型最好卖？</li>
                <li>最近几场表现怎么样？</li>
                <li>今晚应该重点上什么货？</li>
                <li>我的平均毛利率是多少？</li>
              </ul>
              <p>我会直接查你的真实数据给你答案。</p>
            </div>
            <div class="msg-time">刚刚</div>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrap">
          <textarea id="chat-input" placeholder="问我任何关于你生意的问题..."
            rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://awxjvoqhlefxosbzegws.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3eGp2b3FobGVmeG9zYnplZ3dzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzAzMTQsImV4cCI6MjA5MDk0NjMxNH0.Dfutb1IOiajLgoFQnSzcnxPqJ4VTf1sGIZGslB7gkig';
const ANTHROPIC_API = 'https://nexcart-api.luciuschee.workers.dev';

function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h<<5)-h)+s.charCodeAt(i); h|=0; }
  return Math.abs(h).toString(16).padStart(8,'0');
}
const CORRECT = simpleHash('nexcart2026');

function unlock() {
  const v = document.getElementById('lock-input').value;
  if (simpleHash(v) === CORRECT) {
    sessionStorage.setItem('nx_auth', CORRECT);
    document.getElementById('lock').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadStats();
  } else {
    const inp = document.getElementById('lock-input');
    inp.classList.add('shake');
    inp.value = '';
    document.getElementById('lock-err').textContent = '密码错误';
    setTimeout(() => { inp.classList.remove('shake'); document.getElementById('lock-err').textContent = ''; }, 1000);
  }
}
document.getElementById('lock-input').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
if (sessionStorage.getItem('nx_auth') === CORRECT) {
  document.getElementById('lock').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadStats();
}

// Load sidebar stats
async function loadStats() {
  try {
    const [showsRes, salesRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/shows?select=show_date,earnings,gross_profit,margin&order=show_date.desc&limit=1000`, { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY } }),
      fetch(`${SUPABASE_URL}/rest/v1/sales_records?select=price&limit=1`, { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY } })
    ]);
    const shows = await showsRes.json();
    const sales = await salesRes.json();

    if (Array.isArray(shows) && shows.length) {
      document.getElementById('s-shows').textContent = shows.length + '场';
      const avgMargin = shows.filter(s=>s.margin).reduce((a,b)=>a+b.margin,0) / shows.filter(s=>s.margin).length;
      document.getElementById('s-margin').textContent = (avgMargin*100).toFixed(1)+'%';
      document.getElementById('s-last').textContent = shows[0].show_date.slice(5);
    }

    // Count total sales records
    const countRes = await fetch(`${SUPABASE_URL}/rest/v1/sales_records?select=id`, {
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY, 'Prefer': 'count=exact', 'Range': '0-0' }
    });
    const count = countRes.headers.get('content-range');
    if (count) document.getElementById('s-sales').textContent = count.split('/')[1]+'单';

    document.getElementById('header-stats').textContent = shows.length + '场数据 · 实时同步';
  } catch(e) { console.error(e); }
}

// Fetch business data from Supabase
async function fetchBusinessData() {
  const headers = { apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY };

  const [showsRes, salesRes, typeRes, brandRes, sizeRes] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/shows?select=show_date,platform,earnings,cost,gross_profit,margin,buyers,first_time_buyers,max_concurrent,total_views,duration_hrs,show_label&order=show_date.desc&limit=1000`, { headers }),
    fetch(`${SUPABASE_URL}/rest/v1/sales_records?select=shoe_type,price,brand_normalized,size,platform,show_date&order=show_date.desc&limit=5000`, { headers }),
    fetch(`${SUPABASE_URL}/rest/v1/sales_records?select=shoe_type,price&not.shoe_type=is.null&not.price=is.null`, { headers }),
    fetch(`${SUPABASE_URL}/rest/v1/sales_records?select=brand_normalized,price&not.brand_normalized=is.null&not.price=is.null`, { headers }),
    fetch(`${SUPABASE_URL}/rest/v1/sales_records?select=size,price&not.size=is.null&not.price=is.null`, { headers }),
  ]);

  const [shows, sales, byType, byBrand, bySize] = await Promise.all([
    showsRes.json(), salesRes.json(), typeRes.json(), brandRes.json(), sizeRes.json()
  ]);

  // Aggregate shoe type stats
  const typeStats = {};
  byType.forEach(r => {
    if (!typeStats[r.shoe_type]) typeStats[r.shoe_type] = { count: 0, total: 0 };
    typeStats[r.shoe_type].count++;
    typeStats[r.shoe_type].total += r.price;
  });

  // Aggregate brand stats
  const brandStats = {};
  byBrand.forEach(r => {
    if (!brandStats[r.brand_normalized]) brandStats[r.brand_normalized] = { count: 0, total: 0 };
    brandStats[r.brand_normalized].count++;
    brandStats[r.brand_normalized].total += r.price;
  });

  // Aggregate size stats
  const sizeStats = {};
  bySize.forEach(r => {
    if (!sizeStats[r.size]) sizeStats[r.size] = { count: 0, total: 0 };
    sizeStats[r.size].count++;
    sizeStats[r.size].total += r.price;
  });

  // Platform comparison from shows
  const platforms = {};
  shows.forEach(s => {
    if (!platforms[s.platform]) platforms[s.platform] = { count: 0, earnings: 0, margin_sum: 0, margin_count: 0 };
    platforms[s.platform].count++;
    platforms[s.platform].earnings += s.earnings || 0;
    if (s.margin) { platforms[s.platform].margin_sum += s.margin; platforms[s.platform].margin_count++; }
  });

  return { shows, sales: sales.slice(0, 500), typeStats, brandStats, sizeStats, platforms };
}

let conversationHistory = [];

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);
  addMessage('user', text);

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  const typingId = addTyping();

  try {
    let data = { shows: [], sales: [], typeStats: {}, brandStats: {}, sizeStats: {}, platforms: {} };
    try { data = await fetchBusinessData(); } catch(e) { console.warn('Supabase:', e); }

    const systemPrompt = buildSystemPrompt(data);
    conversationHistory.push({ role: 'user', content: text });

    const res = await fetch(ANTHROPIC_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: conversationHistory
      })
    });

    if (!res.ok) throw new Error('API ' + res.status + ': ' + await res.text());
    const result = await res.json();
    const reply = result.content?.[0]?.text || '抱歉，出现了一些问题，请重试。';

    conversationHistory.push({ role: 'assistant', content: reply });
    if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);

    removeTyping(typingId);
    addMessage('agent', reply);
  } catch(e) {
    removeTyping(typingId);
    addMessage('agent', '错误：' + e.message);
    console.error(e);
  }

  btn.disabled = false;
}

function buildSystemPrompt(data) {
  const { shows, typeStats, brandStats, sizeStats, platforms } = data;

  // Top shoe types
  const topTypes = Object.entries(typeStats)
    .map(([t, v]) => ({ type: t, count: v.count, avg: (v.total/v.count).toFixed(1) }))
    .sort((a,b) => b.count - a.count).slice(0, 10);

  // Top brands
  const topBrands = Object.entries(brandStats)
    .map(([b, v]) => ({ brand: b, count: v.count, avg: (v.total/v.count).toFixed(1) }))
    .sort((a,b) => b.avg - a.avg).slice(0, 10);

  // Top sizes
  const topSizes = Object.entries(sizeStats)
    .map(([s, v]) => ({ size: s, count: v.count, avg: (v.total/v.count).toFixed(1) }))
    .filter(s => s.size.includes('US'))
    .sort((a,b) => b.count - a.count).slice(0, 10);

  // Recent shows summary
  const recentShows = shows.map(s =>
    `${s.show_date} | ${s.platform} | 到账$${s.earnings} | 成本$${s.cost} | 毛利率${s.margin ? (s.margin*100).toFixed(0)+'%' : '未知'} | 买家${s.buyers||'未知'}`
  ).join('\n');

  const platformSummary = Object.entries(platforms).map(([p, v]) => {
    const avgMargin = v.margin_count > 0 ? (v.margin_sum/v.margin_count*100).toFixed(1)+'%' : '未知';
    return `${p}: ${v.count}场, 总收入$${v.earnings}, 平均毛利率${avgMargin}`;
  }).join('\n');

  const today = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

  // Build monthly summary
  const monthlySummary = {};
  shows.forEach(s => {
    const month = s.show_date ? s.show_date.slice(0,7) : 'unknown';
    if (!monthlySummary[month]) monthlySummary[month] = { count: 0, earnings: 0, cost: 0, profit: 0 };
    monthlySummary[month].count++;
    monthlySummary[month].earnings += s.earnings || 0;
    monthlySummary[month].cost += s.cost || 0;
    monthlySummary[month].profit += s.gross_profit || 0;
  });
  const monthlyStr = Object.entries(monthlySummary).sort().map(([m, v]) =>
    `${m}: ${v.count}场, 收入$${v.earnings}, 成本$${v.cost}, 毛利$${v.profit.toFixed(0)}, 毛利率${v.earnings>0?(v.profit/v.earnings*100).toFixed(1)+'%':'未知'}`
  ).join('\n');

  return `你是 Nexcart 的专属业务智能体，为一个在美国做线上直播销售二手/尾货鞋子的卖家提供数据分析和业务建议。

今天是 ${today}。

## 业务背景
- 主要平台：Whatnot 和 TikTok Live
- 货源：$0.7/双 批量尾货鞋，约10万双库存，混合存放
- 拍卖式直播，打散排品（混合款式、尺码、颜色）
- 钩子品：Uggs、Coach 等品牌货
- 主要品牌：Cape Robin 系列（K-Robin、Cape Robin等变体）

## 按月汇总（完整数据）
${monthlyStr}

## 最近30场直播数据
${recentShows}

## 平台对比
${platformSummary}

## 鞋型成交分析（按数量排名）
${topTypes.map(t => `${t.type}: ${t.count}单, 平均$${t.avg}`).join('\n')}

## 品牌溢价分析（按均价排名）
${topBrands.map(b => `${b.brand}: ${b.count}单, 平均$${b.avg}`).join('\n')}

## 热销尺码（按频次排名）
${topSizes.map(s => `${s.size}: ${s.count}单, 平均$${s.avg}`).join('\n')}

## 回答要求
- 用中文回答，直接给出数字和结论，不要废话
- 优先引用上面的真实数据，给出具体数字
- 分析要结合尾货直播的业务特点
- 给排品建议时要考虑：钩子品开场、主推品中段、清仓品收尾
- 表格格式用 Markdown，重要数字用 **加粗**
- 回答长度适中，不要超过400字`;
}

function ask(q) {
  document.getElementById('chat-input').value = q;
  sendMessage();
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  const avatar = role === 'agent' ? 'N' : 'YOU';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-content">${formatText(text)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function formatText(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg agent'; div.id = id;
  div.innerHTML = `<div class="msg-avatar">N</div><div><div class="msg-content"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}
function removeTyping(id) { document.getElementById(id)?.remove(); }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
