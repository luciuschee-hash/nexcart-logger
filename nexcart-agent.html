<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nexcart 业务智能体</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-tertiary: #1a2332;
    --bg-card: #1e293b;
    --bg-input: #0f1724;
    --border: #2a3a4e;
    --border-light: #374357;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #10b981;
    --accent-glow: rgba(16, 185, 129, 0.15);
    --accent-gold: #f59e0b;
    --accent-blue: #3b82f6;
    --accent-red: #ef4444;
    --user-bubble: #1e3a5f;
    --ai-bubble: #1a2332;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh; height: 100dvh;
    overflow: hidden;
  }

  /* ====== 锁屏 ====== */
  #lockScreen {
    position: fixed; inset: 0; z-index: 1000;
    background: linear-gradient(135deg, #0a0e17 0%, #111827 50%, #0d1522 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
  }
  #lockScreen.hidden { display: none; }
  .lock-logo { font-size: 48px; margin-bottom: 8px; }
  .lock-title { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
  .lock-subtitle { font-size: 14px; color: var(--text-muted); }
  .lock-input-wrap {
    display: flex; gap: 8px; margin-top: 8px;
  }
  .lock-input-wrap input {
    width: 220px; padding: 12px 16px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-primary); font-size: 15px;
    outline: none; transition: border-color .2s;
  }
  .lock-input-wrap input:focus { border-color: var(--accent); }
  .lock-input-wrap button {
    padding: 12px 24px; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }
  .lock-input-wrap button:hover { background: #059669; }
  .lock-error { color: var(--accent-red); font-size: 13px; height: 20px; }

  /* ====== 主布局 ====== */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #app.hidden { display: none; }

  /* ====== 顶栏 ====== */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .top-left { display: flex; align-items: center; gap: 10px; }
  .top-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .top-dot.offline { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }
  .top-brand { font-size: 13px; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; }
  .top-title { font-size: 17px; font-weight: 700; }
  .top-right { display: flex; gap: 12px; align-items: center; }
  .top-badge {
    font-size: 12px; padding: 4px 10px;
    background: var(--accent-glow); color: var(--accent);
    border-radius: 20px; border: 1px solid rgba(16,185,129,0.3);
  }

  /* ====== 数据概览卡片 ====== */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    padding: 12px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 700; color: var(--text-primary); }
  .stat-value.green { color: var(--accent); }
  .stat-value.gold { color: var(--accent-gold); }

  /* ====== 快捷按钮 ====== */
  .quick-bar {
    display: flex; gap: 6px; padding: 10px 16px;
    overflow-x: auto; flex-shrink: 0;
    background: var(--bg-primary);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .quick-bar::-webkit-scrollbar { display: none; }
  .quick-btn {
    flex-shrink: 0; padding: 8px 14px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text-secondary);
    font-size: 13px; cursor: pointer;
    transition: all .2s; white-space: nowrap;
  }
  .quick-btn:hover, .quick-btn:active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ====== 聊天区域 ====== */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 10px; max-width: 90%; animation: fadeIn .3s ease; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .msg-avatar {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .msg.ai .msg-avatar { background: var(--accent-glow); }
  .msg.user .msg-avatar { background: var(--user-bubble); }

  .msg-bubble {
    padding: 12px 16px; border-radius: 14px;
    line-height: 1.7; font-size: 14px;
    word-break: break-word;
  }
  .msg.ai .msg-bubble { background: var(--ai-bubble); border: 1px solid var(--border); }
  .msg.user .msg-bubble { background: var(--user-bubble); border: 1px solid #2a4a6e; color: #e2e8f0; }

  .msg-bubble h3 { color: var(--accent); font-size: 15px; margin: 8px 0 4px; }
  .msg-bubble strong { color: var(--accent-gold); }
  .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 6px 0; }
  .msg-bubble li { margin: 3px 0; }
  .msg-bubble code { background: #0f1724; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: var(--accent); }
  .msg-bubble table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
  .msg-bubble th, .msg-bubble td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
  .msg-bubble th { background: var(--bg-card); color: var(--accent); font-weight: 600; }

  /* 打字动画 */
  .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-muted);
    animation: typingBounce 1.4s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes typingBounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }

  /* 欢迎消息 */
  .welcome {
    background: linear-gradient(135deg, var(--bg-card), var(--bg-tertiary));
    border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .welcome h2 { font-size: 18px; margin-bottom: 10px; }
  .welcome h2 span { color: var(--accent); }
  .welcome p { color: var(--text-secondary); font-size: 14px; line-height: 1.6; }
  .welcome ul { list-style: none; padding: 0; margin-top: 10px; }
  .welcome li {
    padding: 6px 0; color: var(--text-secondary); font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .welcome li:last-child { border: none; }
  .welcome li::before { content: '→ '; color: var(--accent); }

  /* ====== 输入区 ====== */
  .input-area {
    padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-wrap {
    display: flex; gap: 8px; align-items: flex-end;
    max-width: 800px; margin: 0 auto;
  }
  .input-wrap textarea {
    flex: 1; padding: 12px 16px;
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text-primary);
    font-size: 15px; font-family: inherit;
    resize: none; outline: none;
    max-height: 120px; min-height: 44px;
    line-height: 1.4;
    transition: border-color .2s;
  }
  .input-wrap textarea:focus { border-color: var(--accent); }
  .input-wrap textarea::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 44px; height: 44px;
    background: var(--accent); border: none;
    border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; flex-shrink: 0;
  }
  .send-btn:hover { background: #059669; transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .send-btn svg { width: 20px; height: 20px; fill: white; }

  /* ====== 错误提示 ====== */
  .error-banner {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: #7f1d1d; border: 1px solid #ef4444;
    padding: 10px 20px; border-radius: 10px;
    color: #fca5a5; font-size: 13px; z-index: 999;
    animation: slideDown .3s ease;
    max-width: 90%;
  }
  @keyframes slideDown { from { opacity:0; transform:translate(-50%,-20px); } to { opacity:1; transform:translate(-50%,0); } }

  /* ====== 响应式 ====== */
  @media (max-width: 640px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .stat-value { font-size: 16px; }
    .top-bar { padding: 10px 14px; }
    .chat-area { padding: 12px; }
    .msg { max-width: 95%; }
  }
  @media (min-width: 768px) {
    .chat-area { max-width: 800px; margin: 0 auto; width: 100%; }
    .stats-bar { max-width: 800px; margin: 0 auto; }
  }
</style>
</head>
<body>

<!-- 锁屏 -->
<div id="lockScreen">
  <div class="lock-logo">📊</div>
  <div class="lock-title">NEXCART-OPS</div>
  <div class="lock-subtitle">业务分析智能体</div>
  <div class="lock-input-wrap">
    <input type="password" id="pwdInput" placeholder="请输入访问密码" onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()">进入</button>
  </div>
  <div class="lock-error" id="lockError"></div>
</div>

<!-- 主应用 -->
<div id="app" class="hidden">
  <!-- 顶栏 -->
  <div class="top-bar">
    <div class="top-left">
      <div class="top-dot" id="statusDot"></div>
      <div>
        <div class="top-brand">NEXCART-OPS</div>
        <div class="top-title">业务分析智能体</div>
      </div>
    </div>
    <div class="top-right">
      <div class="top-badge" id="showCount">加载中...</div>
    </div>
  </div>

  <!-- 数据概览 -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-label">总场次</div>
      <div class="stat-value" id="statShows">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">总营收</div>
      <div class="stat-value gold" id="statRevenue">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">总毛利</div>
      <div class="stat-value green" id="statProfit">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均毛利率</div>
      <div class="stat-value green" id="statMargin">--</div>
    </div>
  </div>

  <!-- 快捷问题 -->
  <div class="quick-bar">
    <button class="quick-btn" onclick="ask('最近10场的毛利率趋势怎么样？哪几场表现最好？')">📈 毛利趋势</button>
    <button class="quick-btn" onclick="ask('帮我分析一下鞋型成交价排名，哪种鞋最赚钱？')">👟 鞋型排名</button>
    <button class="quick-btn" onclick="ask('热销尺码分析，哪些尺码卖得最好？')">📏 尺码分析</button>
    <button class="quick-btn" onclick="ask('对比一下各平台的表现，哪个平台利润率最高？')">⚖️ 平台对比</button>
    <button class="quick-btn" onclick="ask('分析最近的最佳场次，是什么让它表现好？')">🏆 最佳场次</button>
    <button class="quick-btn" onclick="ask('品牌溢价分析，哪个品牌利润空间最大？')">🏷️ 品牌分析</button>
    <button class="quick-btn" onclick="ask('根据历史数据，给我今晚直播的排品建议')">🎯 排品建议</button>
    <button class="quick-btn" onclick="ask('给我一个完整的月度经营总结报告')">📋 月度报告</button>
  </div>

  <!-- 聊天区域 -->
  <div class="chat-area" id="chatArea">
    <div class="welcome">
      <h2>你好！我是 <span>Nexcart 业务智能体</span></h2>
      <p>已连接到实时数据库，所有数据 100% 真实准确。</p>
      <ul>
        <li>问我任何关于 GMV、毛利率、成交量的问题</li>
        <li>分析鞋型、品牌、尺码的销售表现</li>
        <li>对比不同场次和平台的数据</li>
        <li>获取基于数据的排品和运营建议</li>
      </ul>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="问我任何关于你生意的问题..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ============ 配置 ============
const WORKER_URL = 'https://nexcart-api.luciuschee.workers.dev';
const CORRECT_HASH = 'nexcart2026';
const chatHistory = [];
let isLoading = false;

// ============ 密码验证 ============
function unlock() {
  const pwd = document.getElementById('pwdInput').value.trim();
  if (pwd === CORRECT_HASH) {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadStats();
  } else {
    document.getElementById('lockError').textContent = '密码错误，请重试';
    document.getElementById('pwdInput').value = '';
    setTimeout(() => document.getElementById('lockError').textContent = '', 2000);
  }
}

// ============ 加载统计数据 ============
async function loadStats() {
  try {
    const res = await fetch(WORKER_URL + '/stats');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('statShows').textContent = data.totalShows;
    document.getElementById('statRevenue').textContent = '$' + Number(data.totalEarnings).toLocaleString();
    document.getElementById('statProfit').textContent = '$' + Number(data.totalProfit).toLocaleString();
    document.getElementById('statMargin').textContent = data.avgMargin + '%';
    document.getElementById('showCount').textContent = data.totalShows + '场数据 · 实时';
    document.getElementById('statusDot').classList.remove('offline');
  } catch (e) {
    document.getElementById('showCount').textContent = '连接失败';
    document.getElementById('statusDot').classList.add('offline');
    console.error('Stats load error:', e);
  }
}

// ============ 发送消息 ============
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';
  autoResize(input);

  // 添加用户消息
  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  // 添加打字动画
  const typingId = addTyping();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: chatHistory.slice(-10), // 保留最近10条对话上下文
      }),
    });

    const result = await res.json();

    // 移除打字动画
    removeTyping(typingId);

    let reply = '';
    if (result.content && result.content[0]) {
      reply = result.content[0].text;
    } else if (result.error) {
      reply = '⚠️ ' + (result.error.message || JSON.stringify(result.error));
    } else {
      reply = '⚠️ 返回数据异常，请重试。';
    }

    // 检查是否有内部错误标记
    if (result._error === 'credit_balance') {
      showErrorBanner('API 额度不足，请联系管理员充值');
    }

    addMessage('ai', reply);
    chatHistory.push({ role: 'assistant', content: reply });

  } catch (e) {
    removeTyping(typingId);
    const errMsg = e.message.includes('Failed to fetch')
      ? '⚠️ 网络连接失败，请检查网络后重试。'
      : '⚠️ 请求失败: ' + e.message;
    addMessage('ai', errMsg);
    showErrorBanner('网络连接异常，请检查网络');
  }

  isLoading = false;
  btn.disabled = false;
  input.focus();
}

// ============ 快捷提问 ============
function ask(question) {
  document.getElementById('msgInput').value = question;
  sendMessage();
}

// ============ 消息渲染 ============
function addMessage(role, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = role === 'ai' ? '📊' : '👤';
  const formatted = role === 'ai' ? formatMarkdown(text) : escapeHtml(text);

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${formatted}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addTyping() {
  const area = document.getElementById('chatArea');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar">📊</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ============ Markdown 解析 ============
function formatMarkdown(text) {
  let html = escapeHtml(text);

  // 表格
  html = html.replace(/\n?\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g, (match, header, body) => {
    const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // 标题
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h3>$1</h3>');

  // 加粗
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // 列表
  html = html.replace(/^[•\-]\s+(.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');

  // 数字列表
  html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

  // 代码
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // 换行
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');

  return `<p>${html}</p>`;
}

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
  return text.replace(/[&<>"]/g, c => map[c]);
}

// ============ 错误提示 ============
function showErrorBanner(msg) {
  const existing = document.querySelector('.error-banner');
  if (existing) existing.remove();

  const banner = document.createElement('div');
  banner.className = 'error-banner';
  banner.textContent = msg;
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 5000);
}

// ============ 输入交互 ============
function handleKey(e) {
